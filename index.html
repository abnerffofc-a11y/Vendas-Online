<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&A Marketplace</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- CAPA -->
<section id="capa" class="hero show">
  <h1>Bem-vindo ao A&A Marketplace</h1>
  <p>Compre e venda produtos na sua cidade de forma rápida e simples.</p>
</section>

<!-- LOGIN -->
<section id="login-section" class="container show">
  <h2>🔐 Login / Cadastro</h2>

  <p id="status-login">Você não está logado</p>

  <input id="email" type="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="cadastrar(email.value, senha.value)">Cadastrar</button>
  <button onclick="entrar(email.value, senha.value)">Entrar</button>
  <button onclick="sair()">Sair</button>
</section>

<header>
  <h2>A&A Marketplace</h2>
  <nav>
    <a href="#" onclick="irPara('anuncios')">Anúncios</a>
    <a href="#" onclick="irPara('anunciar')">Anunciar</a>
    <a href="#" onclick="irPara('meus-anuncios')">Meus</a>
  </nav>
</header>

<!-- ANÚNCIOS -->
<section id="anuncios" class="container hide">
  <h2>🛒 Anúncios</h2>
  <div id="lista-anuncios"></div>
</section>

<!-- PUBLICAR -->
<section id="anunciar" class="container hide">
  <h2>📢 Publicar Anúncio</h2>

  <form id="form-anuncio">
    <input id="nome" placeholder="Nome">
    <input id="preco" placeholder="Preço">
    <input id="cidade" placeholder="Cidade">
    <input id="whatsapp" placeholder="WhatsApp">
    <textarea id="descricao" placeholder="Descrição"></textarea>

    <button type="submit">Publicar</button>
  </form>
</section>

<!-- MEUS -->
<section id="meus-anuncios" class="container hide">
  <h2>👤 Meus Anúncios</h2>
  <div id="lista-meus"></div>
</section>

<script type="module" src="script.js"></script>
</body>
</html>
