<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A&A Marketplace</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- CAPA -->
<section id="capa" class="hero">
  <h1>Bem-vindo ao A&A Marketplace</h1>
  <p>Compre e venda na sua cidade de forma rápida e simples.</p>
</section>

<!-- LOGIN -->
<section id="login" class="container">
  <h2>🔐 Login / Cadastro</h2>

  <p id="status-login">Você não está logado</p>

  <input id="email" type="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="entrar()">Entrar</button>
<button onclick="cadastrar()">Cadastrar</button>
<button onclick="sair()">Sair</button>
</section>

<!-- APP (SÓ QUANDO LOGADO) -->
<div id="app" style="display:none;">

  <!-- HEADER -->
  <header>
    <h2>A&A Marketplace</h2>

    <nav>
      <a href="#" onclick="irPara('anuncios')">Anúncios</a>
      <a href="#" onclick="irPara('anunciar')">Anunciar</a>
      <a href="#" onclick="irPara('meus-anuncios')">Meus Anúncios</a>
      <a href="#" onclick="irPara('favoritos')">Favoritos</a>
    </nav>
  </header>

  <!-- ANÚNCIOS -->
  <section id="anuncios">
    <h2>🛒 Anúncios</h2>

    <!-- filtros aqui -->
    <div class="filtros"></div>

    <div id="lista-anuncios"></div>
  </section>

  <!-- PUBLICAR -->
  <section id="anunciar">
    <h2>📢 Publicar Anúncio</h2>

    <form id="form-anuncio">
      <input id="nome" placeholder="Nome">
      <input id="preco" placeholder="Preço">
      <input id="cidade" placeholder="Cidade">
      <input id="whatsapp" placeholder="WhatsApp">
      <textarea id="descricao" placeholder="Descrição"></textarea>

      <button type="submit">Publicar</button>
    </form>
  </section>

  <!-- MEUS -->
  <section id="meus-anuncios">
    <h2>👤 Meus Anúncios</h2>
    <div id="lista-meus-anuncios"></div>
  </section>

  <!-- FAVORITOS -->
  <section id="favoritos">
    <h2>❤️ Favoritos</h2>
    <div id="lista-favoritos"></div>
  </section>

</div>

<script type="module" src="script.js"></script>
</body>
</html>
